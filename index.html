<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub 遠端登入測試</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 30px; background-color: #eef2f3; display: flex; justify-content: center; }
        .container { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; color: #666; font-size: 14px; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007BFF; border: none; color: white; font-size: 16px; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        button:disabled { background: #cccccc; cursor: not-allowed; }
        .error-msg { color: #d9534f; font-size: 14px; margin-top: 10px; display: none; }
        #welcome-interface { display: none; }
        .logout-btn { background: #6c757d; margin-top: 15px; }
        .logout-btn:hover { background: #5a6268; }
    </style>
</head>
<body>

    <div class="container" id="login-interface">
        <h2>會員登入 (GitHub)</h2>
        <div class="input-group">
            <label>帳號</label>
            <input type="text" id="username" placeholder="請輸入帳號">
        </div>
        <div class="input-group">
            <label>密碼</label>
            <input type="password" id="password" placeholder="請輸入密碼">
        </div>
        <button id="login-btn" onclick="handleLogin()">登入系統</button>
        <div class="error-msg" id="error-message">❌ 帳號或密碼錯誤！</div>
    </div>

    <div class="container" id="welcome-interface">
        <h2>🎉 跨網域登入成功！</h2>
        <p>歡迎回來，<span id="display-username" style="color: #007BFF; font-weight: bold;">使用者</span></p>
        <p>這個網頁完全不受 Google 多重帳號衝突的影響。</p>
        <button class="logout-btn" onclick="handleLogout()">登出</button>
    </div>

    <script>
        // ⚠️【請把下方引號內換成你剛剛在第二步複製的 GAS 網頁應用程式網址】
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzICi4hs-4dBeCRVpgta4EPn_svmW2aWeWq9vfQj8PYyoUCQeg1kGe0esyDi5i_C5Oufg/exec";

        function handleLogin() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-message');
            const loginBtn = document.getElementById('login-btn');

            if (!user || !pass) {
                alert("請輸入帳號與密碼！");
                return;
            }

            // 按鈕進入讀取狀態，避免重複點擊
            loginBtn.innerText = "驗證中...";
            loginBtn.disabled = true;

            // 使用標準 Fetch API 發送連線給 GAS
            fetch(GAS_API_URL, {
                method: "POST",
                body: JSON.stringify({ username: user, password: pass })
            })
            .then(response => response.json())
            .then(result => {
                loginBtn.innerText = "登入系統";
                loginBtn.disabled = false;

                if (result.success) {
                    errorMsg.style.display = 'none';
                    document.getElementById('login-interface').style.display = 'none';
                    document.getElementById('welcome-interface').style.display = 'block';
                    document.getElementById('display-username').innerText = result.username;
                } else {
                    errorMsg.style.display = 'block';
                }
            })
            .catch(error => {
                console.error("錯誤:", error);
                loginBtn.innerText = "登入系統";
                loginBtn.disabled = false;
                alert("連線失敗，請確認你的 GAS 網址是否正確，且有設定為公開(所有人)。");
            });
        }

        function handleLogout() {
            document.getElementById('welcome-interface').style.display = 'none';
            document.getElementById('login-interface').style.display = 'block';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }
    </script>
</body>
</html>
